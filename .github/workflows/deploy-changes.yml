name: Database Migrations

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  # ─────────────────────────────────────────────────────────────
  # SAFETY SCAN — Runs on all branches
  # Scans every SQL file for destructive statements.
  # Fails immediately if any are found so you must review them.
  # This does NOT block legitimate DROP statements — it flags them
  # for human review before they can reach production.
  # ─────────────────────────────────────────────────────────────
  scan-for-destructive-sql:
    name: Scan for Destructive SQL
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Scan SQL files for destructive statements
        run: |
          echo "Scanning all SQL migration files for destructive statements..."

          # Patterns that REQUIRE human review before they can reach production
          PATTERNS=(
            "DROP TABLE"
            "DROP COLUMN"
            "TRUNCATE"
            "DELETE FROM [a-zA-Z]"
            "ALTER TABLE.*DROP"
          )

          FOUND=0
          FILES_SCANNED=0

          for SQL_FILE in Migration.DbUp/Scripts/*.sql; do
            FILES_SCANNED=$((FILES_SCANNED + 1))
            for PATTERN in "${PATTERNS[@]}"; do
              # Case-insensitive grep — ignore comment lines (starting with --)
              MATCHES=$(grep -in "$PATTERN" "$SQL_FILE" | grep -v "^\s*--" || true)
              if [ -n "$MATCHES" ]; then
                echo ""
                echo "⚠️  DESTRUCTIVE STATEMENT FOUND in: $SQL_FILE"
                echo "$MATCHES"
                FOUND=$((FOUND + 1))
              fi
            done
          done

          echo ""
          echo "Scanned $FILES_SCANNED SQL files."

          if [ $FOUND -gt 0 ]; then
            echo ""
            echo "❌ $FOUND destructive statement(s) found."
            echo "   This pipeline will NOT automatically deploy these to production."
            echo "   Review the statements above. If they are intentional:"
            echo "   1. Get a second pair of eyes to confirm"
            echo "   2. Approve the 'production' environment gate manually in GitHub Actions"
            echo "   3. The migration will then run — with no further ability to undo"
            exit 1
          fi

          echo "✅ No destructive statements found. Safe to proceed."

  # ─────────────────────────────────────────────────────────────
  # STAGING — Auto-run on develop push
  # Runs migrations against the neondb (staging) database.
  # No approval required.
  # ─────────────────────────────────────────────────────────────
  migrate-staging:
    name: Migrate — Staging DB
    runs-on: ubuntu-latest
    needs: scan-for-destructive-sql
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release

      - name: Run migrations on staging DB (neondb)
        run: |
          echo "Running migrations on staging database..."
          dotnet run \
            --project Migration.DbUp/Migration.DbUp.csproj \
            -- "Host=ep-long-unit-afcwfcyj-pooler.c-2.us-west-2.aws.neon.tech;Database=neondb;Username=neondb_owner;Password=${{ secrets.DB_PASSWORD_DEV }};SSL Mode=Require;Trust Server Certificate=True"
          echo "✅ Staging migrations complete"

  # ─────────────────────────────────────────────────────────────
  # PRODUCTION — Only runs on main push, AFTER manual approval
  # The 'production' GitHub Environment provides the approval gate.
  # Approvers must explicitly click Approve in GitHub Actions UI.
  # ─────────────────────────────────────────────────────────────
  migrate-production:
    name: Migrate — Production DB
    runs-on: ubuntu-latest
    needs: scan-for-destructive-sql
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production   # ← This is the approval gate

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release

      - name: Run migrations on production DB (clereview)
        run: |
          echo "Running migrations on PRODUCTION database..."
          dotnet run \
            --project Migration.DbUp/Migration.DbUp.csproj \
            -- "Host=ep-long-unit-afcwfcyj-pooler.c-2.us-west-2.aws.neon.tech;Database=clereview;Username=neondb_owner;Password=${{ secrets.DB_PASSWORD_PROD }};SSL Mode=Require;Trust Server Certificate=True"
          echo "✅ Production migrations complete"